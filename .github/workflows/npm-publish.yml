name: Publish npm Package and Native Binaries

on:
  push:
    tags:
      - "v*"

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  build-native:
    name: Build native ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux-x64
            runner: ubuntu-latest
            output: openclaude-linux-x64
          - platform: darwin-x64
            runner: macos-15-intel
            output: openclaude-darwin-x64
          - platform: darwin-arm64
            runner: macos-14
            output: openclaude-darwin-arm64
          - platform: win32-x64
            runner: windows-latest
            output: openclaude-win32-x64.exe

    steps:
      - name: Check out tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Build native binary
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p native-dist
          ARGS=(
            bun build
            --compile
            --target=bun
            --compile-autoload-package-json
            --external=sharp
            --external=@aws-sdk/client-bedrock
            --external=@aws-sdk/client-bedrock-runtime
            --external=@aws-sdk/client-sts
            --external=@aws-sdk/credential-providers
            --external=@aws-sdk/credential-provider-node
            --external=@smithy/node-http-handler
            --external=@smithy/core
            --external=@azure/identity
            --external=google-auth-library
            --external=@vscode/ripgrep
            --external=@orama/orama
            --external=@orama/plugin-data-persistence
            --outfile="native-dist/${{ matrix.output }}"
            dist/cli.mjs
          )

          if [[ "${{ matrix.platform }}" == "win32-x64" ]]; then
            ARGS+=(
              --windows-title OpenClaude
              --windows-description OpenClaude
            )
          fi

          "${ARGS[@]}"
          "native-dist/${{ matrix.output }}" --version

      - name: Upload native binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: native-${{ matrix.platform }}
          path: native-dist/${{ matrix.output }}
          if-no-files-found: error

  release-native:
    name: Publish GitHub Release binaries
    runs-on: ubuntu-latest
    needs: build-native

    steps:
      - name: Check out tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Download native binaries
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          pattern: native-*
          path: native-dist
          merge-multiple: true

      - name: Generate native manifest
        run: bun run build:native:manifest

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" native-dist/* --clobber
          else
            gh release create "$GITHUB_REF_NAME" native-dist/* \
              --title "$GITHUB_REF_NAME" \
              --notes "OpenClaude $GITHUB_REF_NAME"
          fi

  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: release-native
    environment: npm-publish

    steps:
      - name: Check out tag
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version-file: .bun-version

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build package
        run: bun run build

      - name: Smoke test
        run: node dist/cli.mjs --version

      - name: Verify package metadata
        shell: bash
        run: |
          set -euo pipefail
          PACKAGE_NAME="$(node -p "require('./package.json').name")"
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAG_VERSION="${GITHUB_REF_NAME#v}"

          if [[ "$PACKAGE_NAME" != "@makerbi/openclaude" ]]; then
            echo "Expected package name @makerbi/openclaude, got $PACKAGE_NAME" >&2
            exit 1
          fi

          if [[ "$PACKAGE_VERSION" != "$TAG_VERSION" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match package version $PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Dry-run package
        run: npm pack --dry-run

      - name: Publish to npm
        run: npm publish --access public

      - name: Release summary
        shell: bash
        run: |
          {
            echo "## Published $GITHUB_REF_NAME"
            echo
            echo "- npm: https://www.npmjs.com/package/@makerbi/openclaude/v/${GITHUB_REF_NAME#v}"
            echo "- repository: https://github.com/${GITHUB_REPOSITORY}"
          } >> "$GITHUB_STEP_SUMMARY"
